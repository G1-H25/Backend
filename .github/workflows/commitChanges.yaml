name: pushChanges

on: 
    push:
        branches:
                - feature/WilmerPrototyping
                - development 
    pull_request:
        branches: 
                - main
                - development



jobs:
  push_changes_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
           python-version: '3.10'

      - name: Set up Python and print version
        run: python3 --version

      - name: Set up Python and print version
        run: python3 --run