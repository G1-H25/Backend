name: pushChanges

on: 
  push:
    branches:
      - feature/WilmerPrototyping
      - development 
  pull_request:
    branches: 
      - main
      - development

jobs:
  build_and_run_dotnet:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'  # Use '7.0.x', '8.0.x', etc., depending on your project

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: dotnet restore src/GpsSensorApi/GpsSensorApi.csproj

      # Step 4: Build the project
      - name: Build project
        run: dotnet build src/GpsSensorApi/GpsSensorApi.csproj --configuration Release

      # Optional: Step 5: Run the application (if it's a console app)
      # - name: Run the application
      #   run: dotnet run --project src/GpsSensorApi/GpsSensorApi.csproj

      # Optional: Step 6: Run tests (if you have a test project)
      # - name: Run tests
      #   run: dotnet test src/GpsSensorApi.Tests/GpsSensorApi.Tests.csproj
