# .pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format src/src.sln --verify-no-changes --no-restore
        language: system  # Uses system-installed dotnet
        files: \.cs$
        pass_filenames: false  # dotnet format works on whole project/solution
